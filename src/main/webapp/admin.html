<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LETMEDRIVE | Admin</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<main class="page">
    <div class="shell">
        <header class="panel topbar fade-up">
            <div class="brand-row">
                <img src="assets/images/logo.png" alt="LetMeDrive" class="brand-logo" />
                <span class="badge">Admin Console</span>
            </div>
            <button id="logoutBtn" class="btn btn-secondary" type="button">Logout</button>
        </header>

        <div class="glow-line"></div>

        <section class="grid two-col fade-up">
            <article class="panel card pad">
                <h3 class="section-title-sm">Block / Unblock Customer</h3>
                <form id="blockForm" class="form">
                    <div>
                        <label for="customerId">Customer ID</label>
                        <input id="customerId" type="number" min="1" required />
                    </div>
                    <div>
                        <label for="blockAction">Action</label>
                        <select id="blockAction">
                            <option value="true">Block Customer</option>
                            <option value="false">Unblock Customer</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" type="submit">Submit</button>
                </form>
                <div id="adminStatus" class="status"></div>
            </article>

            <article class="panel card pad">
                <h3 class="section-title-sm">Notes</h3>
                <p class="note">Use customer ID from signup flow. Blocking immediately prevents new rentals by that customer.</p>
            </article>
        </section>

        <h2 class="section-title fade-up">Recent Admin Operations</h2>
        <section class="panel fade-up" style="padding: 12px 14px;">
            <table class="table">
                <thead>
                <tr>
                    <th>Time</th>
                    <th>Customer ID</th>
                    <th>Action</th>
                    <th>Result</th>
                </tr>
                </thead>
                <tbody id="opsBody"></tbody>
            </table>
        </section>
    </div>
</main>
<script src="assets/js/admin.js"></script>
</body>
</html>
