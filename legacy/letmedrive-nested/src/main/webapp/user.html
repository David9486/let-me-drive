<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LETMEDRIVE | User</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<main class="page">
    <div class="shell">
        <header class="panel topbar fade-up">
            <div class="brand-row">
                <img src="assets/images/logo.png" alt="LetMeDrive" class="brand-logo" />
                <span class="badge">User Dashboard</span>
            </div>
            <button id="logoutBtn" class="btn btn-secondary" type="button">Logout</button>
        </header>

        <div class="glow-line"></div>

        <section class="grid two-col fade-up">
            <article class="panel card pad">
                <h3 class="section-title-sm">Search Available Cars</h3>
                <form id="availabilityForm" class="form">
                    <div>
                        <label for="seats">Number of Seats</label>
                        <input id="seats" type="number" min="2" max="9" value="5" required />
                    </div>
                    <div>
                        <label for="startTime">Start Time</label>
                        <input id="startTime" type="datetime-local" required />
                    </div>
                    <div>
                        <label for="endTime">Expected Return Time</label>
                        <input id="endTime" type="datetime-local" required />
                    </div>
                    <button class="btn btn-primary" type="submit">Search</button>
                </form>
                <div id="availabilityStatus" class="status"></div>
            </article>

            <article class="panel card pad">
                <h3 class="section-title-sm">Return a Car</h3>
                <form id="returnForm" class="form">
                    <div>
                        <label for="rentalId">Rental ID</label>
                        <input id="rentalId" type="number" min="1" required />
                    </div>
                    <div>
                        <label for="actualReturnTime">Actual Return Time</label>
                        <input id="actualReturnTime" type="datetime-local" required />
                    </div>
                    <button class="btn btn-secondary" type="submit">Return & Calculate Fine</button>
                </form>
                <div id="returnStatus" class="status"></div>
            </article>
        </section>

        <h2 class="section-title fade-up">My Rentals</h2>
        <section class="panel fade-up" style="padding: 12px 14px;">
            <table class="table">
                <thead>
                <tr>
                    <th>Rental ID</th>
                    <th>Car ID</th>
                    <th>Start</th>
                    <th>Expected Return</th>
                    <th>Status</th>
                    <th>Total</th>
                </tr>
                </thead>
                <tbody id="myRentalsBody"></tbody>
            </table>
        </section>

        <h2 class="section-title fade-up">Available Premium Fleet</h2>
        <section id="carsGrid" class="grid cars"></section>
    </div>
</main>
<script src="assets/js/user.js"></script>
</body>
</html>
